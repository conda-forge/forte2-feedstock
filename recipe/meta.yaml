{% set name = "forte2" %}
{% set version = "2026.5.4" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/evangelistalab/forte2/archive/v{{ version }}-alpha.tar.gz
  sha256: dac0e00c5d2fc53bf9fc52506da4f65063762fc893b906fd9bc72242a0914754

build:
  skip: true  # [win]
  skip: true  # [py<311]
  number: 0

requirements:
  build:
    - python                                 # [build_platform != target_platform]
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
    - nanobind >=1.3.2                       # [build_platform != target_platform]
    - {{ stdlib("c") }}
    - {{ compiler('cxx') }}
    - cmake =3.26
    - make
    - scikit-build-core >=0.10
  host:
    - python
    - pip
    - nanobind >=1.3.2
    - cmake =3.26
    - scikit-build-core >=0.10
    - openblas
    - eigen =3.4.0
    - libboost-python-devel
    - libint
  run:
    - python
    - numpy
    - scipy
    - regex
    - basis_set_exchange
    - libint
    - libopenblas
    - pytest
    - scikit-build-core >=0.10

test:
  imports:
    - forte2
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/evangelistalab/forte2
  dev_url: https://github.com/evangelistalab/forte2
  doc_url: https://forte2.readthedocs.io/en/latest/
  doc_source_url: https://github.com/evangelistalab/forte2/tree/main/docs/source
  license: LGPL-3.0-only AND GPL-3.0-only
  license_file:
    - COPYING.LESSER
    - COPYING
  summary: An open-source suite of quantum chemistry methods for strongly correlated electrons
  description: |
    Forte2 is a primarily Python-based, open-source, standalone package that
    implements a variety of quantum chemistry methods for strongly correlated electrons.

extra:
  recipe-maintainers:
    - brianz98
    - fevangelista
